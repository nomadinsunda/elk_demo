input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["cdc.public.posts"]
    group_id => "logstash-consumer-group"
    consumer_threads => 1
    decorate_events => true
    codec => "json"
    # 처음부터 데이터를 읽으려면 아래 옵션을 추가할 수 있습니다.
    # auto_offset_reset => "earliest"
  }
}

filter {
  # 1. Debezium 데이터는 [payload] 안에 실제 로직(op, after 등)이 들어있습니다.
  # 먼저 payload 존재 여부를 체크합니다.
  if [payload] {

    # 생성(c), 수정(u), 읽기(r) 처리
    if [payload][op] in ["c", "u", "r"] {
      mutate {
        add_field => {
          "id"         => "%{[payload][after][id]}"
          "title"      => "%{[payload][after][title]}"
          "content"    => "%{[payload][after][content]}"
          "author"     => "%{[payload][after][author]}"
          "created_at" => "%{[payload][after][created_at]}"
        }
      }
    }

    # 삭제(d) 처리
    else if [payload][op] == "d" {
      mutate {
        add_field => { "id" => "%{[payload][before][id]}" }
        add_tag => ["deleted"]
      }
    }
  }

  # 2. 불필요한 원본 데이터 및 메타데이터 필드 일괄 삭제
  # @version, payload, schema 등을 정리하여 ES 저장 용량을 아낍니다.
  mutate {
    remove_field => ["payload", "schema", "@version", "transaction"]
  }
}

output {
  # 삭제 태그가 있으면 ES에서 해당 ID의 문서를 삭제
  if "deleted" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "delete"
      document_id => "%{id}"
    }
  }
  # 생성/수정인 경우 Upsert (없으면 생성, 있으면 갱신) 처리
  else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "update"
      doc_as_upsert => true
      document_id => "%{id}"
    }
  }

  # 콘솔 디버깅용 (운영 시 주석 처리 권장)
  stdout { codec => rubydebug }
}
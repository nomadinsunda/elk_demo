input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["cdc.public.posts"]
    group_id => "logstash-consumer-group"
    consumer_threads => 1
    decorate_events => true
    codec => "json"
    auto_offset_reset => "earliest"
  }
}

filter {
  # 1. Debezium 데이터 존재 여부 체크
  if [payload] {

    # 2. 생성(c), 수정(u), 읽기(r) 처리
    if [payload][op] in ["c", "u", "r"] {
      mutate {
        # rename은 데이터 타입(Long, Integer 등)을 유지하며 루트로 이동시킵니다.
        rename => { "[payload][after][id]" => "id" }
        rename => { "[payload][after][title]" => "title" }
        rename => { "[payload][after][content]" => "content" }
        rename => { "[payload][after][author]" => "author" }
      }
    }

    # 3. 삭제(d) 처리
    else if [payload][op] == "d" {
      mutate {
        rename => { "[payload][before][id]" => "id" }
        add_tag => ["deleted"]
      }
    }
  }

  # 4. 불필요한 메타데이터 일괄 제거
  # payload는 rename으로 내용이 비워졌으므로 삭제해도 무방합니다.
  mutate {
    remove_field => ["payload", "schema", "@version", "@timestamp", "transaction", "event"]
  }
}

output {
  if "deleted" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "delete"
      document_id => "%{id}"
    }
  } else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "update"
      doc_as_upsert => true
      document_id => "%{id}"
    }
  }

  # 디버깅을 위해 유지하되, 나중에 운영 시에는 제거하세요.
  stdout { codec => rubydebug }
}
input {
  kafka {
    bootstrap_servers => "kafka:9092"
    # Debezium은 기본적으로 [서버이름].[스키마].[테이블] 형식의 토픽을 생성합니다.
    # 나중에 커넥터 설정 시 'board-server'라고 명명할 예정입니다.
    topics => ["board-server.public.posts"]
    group_id => "logstash-consumer-group"
    consumer_threads => 1
    decorate_events => true
    # JSON 형식으로 들어오는 데이터를 파싱합니다.
    codec => "json"
  }
}

filter {
  # Debezium 데이터는 { "before": ..., "after": ..., "op": ... } 구조입니다.
  # 데이터가 생성(c), 수정(u), 읽기(r)인 경우 'after' 필드의 데이터를 사용합니다.
  if [op] in ["c", "u", "r"] {
    mutate {
      add_field => { "id" => "%{[after][id]}" }
      add_field => { "title" => "%{[after][title]}" }
      add_field => { "content" => "%{[after][content]}" }
      add_field => { "author" => "%{[after][author]}" }
      add_field => { "created_at" => "%{[after][created_at]}" }
    }
  }

  # 데이터가 삭제(d)된 경우 해당 문서를 ES에서도 지우기 위한 플래그 설정
  if [op] == "d" {
    mutate {
      add_field => { "id" => "%{[before][id]}" }
      add_tag => ["deleted"]
    }
  }

  # 불필요한 원본 메타데이터 필드 삭제 (정리)
  mutate {
    remove_field => ["source", "before", "after", "op", "transaction", "schema"]
  }
}

output {
  if "deleted" in [tags] {
    # 삭제 작업 처리
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "delete"
      document_id => "%{id}"
    }
  } else {
    # 생성 및 수정 작업 처리
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "posts"
      action => "update"
      doc_as_upsert => true # 데이터가 없으면 생성, 있으면 수정
      document_id => "%{id}"
    }
  }

  # 디버깅용: 로그스태시 콘솔에 출력 (작동 확인 후 주석 처리 가능)
  stdout { codec => rubydebug }
}
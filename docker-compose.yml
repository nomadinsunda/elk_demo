version: '3.8'

services:
  # --- Kafka & Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - board-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - board-network

  # --- Debezium (Kafka Connect) ---
  connect:
    image: debezium/connect:2.1
    container_name: debezium-connect
    depends_on: [kafka, postgres-db]
    ports:
      - "8083:8083" # 커넥터 등록 API용
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      # Debezium이 DB 데이터를 JSON으로 직렬화할 때 설정
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    networks:
      - board-network

  # --- Elasticsearch & Kibana ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - board-network

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    container_name: kibana
    depends_on: [elasticsearch]
    ports:
      - "5601:5601"
    networks:
      - board-network

  # --- Logstash ---
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    depends_on: [kafka, elasticsearch]
    networks:
      - board-network

  # --- 원본 DB (CDC:Change Data Capture 설정 추가) ---
  postgres-db:
    image: postgres:15-alpine
    container_name: board-postgres
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical"] # CDC를 위한 논리적 복제 설정
    environment:
      POSTGRES_DB: board_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d board_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - board-network

  board-service:
    image: intheeast0305/board-service:latest
    container_name: board-service
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/board_db
      SPRING_DATASOURCE_USERNAME: dev_user
      SPRING_DATASOURCE_PASSWORD: dev_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - board-network
    restart: always

  search-service:
    image: intheeast0305/search-service:latest
    container_name: search-service
    ports:
      - "8089:8089"
    depends_on:
      - elasticsearch # 엘라스틱서치가 실행된 뒤에 실행되도록 추가
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      # 아래 설정을 추가하여 YAML 설정을 강제로 덮어씌웁니다.
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    networks:
      - board-network
    restart: always

networks:
  board-network:
    driver: bridge

volumes:
  postgres_data: